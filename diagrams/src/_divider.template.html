<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="kit.css">
<!-- PART DIVIDER TEMPLATE.  Copy to  diagramas/src/divider-1.html (… -2, -3)  and edit.
     render.py screenshots full-page (816×1056) -> divider-N.png, placed full-bleed by build_doc.
     Reference it with a ('part','divider-1.png') block; map it to a TOC label in build_doc PART_LABELS. -->
<style>
  html,body{width:816px;height:1056px;overflow:hidden}
  .d{position:relative;width:816px;height:1056px;overflow:hidden;display:flex;flex-direction:column;padding:64px 70px;
    color:var(--d-ink);background:radial-gradient(110% 70% at 88% 0%, #20202f 0%, #14141d 42%, #0C0C12 80%)}
  .grid-bg{position:absolute;inset:0;background-image:
     linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
     background-size:48px 48px;mask-image:radial-gradient(120% 90% at 80% 10%,#000,transparent 72%)}
  .ghost{position:absolute;right:40px;top:160px;font-size:430px;font-weight:900;line-height:.8;letter-spacing:-.05em;
    color:transparent;-webkit-text-stroke:2px rgba(255,107,53,.13);z-index:1}
  .top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:3}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mk{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--brand-2))}
  .brand .wm{font-weight:800;font-size:15px}
  .kk{font-family:'JetBrains Mono';font-size:12px;color:var(--d-muted);letter-spacing:.14em;text-transform:uppercase;text-align:right}
  .cpr{font-size:10px;color:#73768f;letter-spacing:.02em;text-transform:none}
  .mid{position:relative;z-index:3;margin-top:auto;margin-bottom:36px}
  .pl{display:inline-block;font-size:15px;font-weight:800;letter-spacing:.28em;color:var(--brand);text-transform:uppercase}
  h1{font-size:60px;font-weight:900;letter-spacing:-.03em;line-height:1.03;margin:18px 0 0;
    background:linear-gradient(180deg,#fff 40%,#c9cadf);-webkit-background-clip:text;background-clip:text;color:transparent}
  .rule{width:90px;height:5px;border-radius:5px;margin:26px 0 22px;background:linear-gradient(90deg,var(--brand),var(--brand-2))}
  .desc{font-size:19px;line-height:1.55;color:#c5c7dd;max-width:560px}
  .toc{position:relative;z-index:3;display:flex;flex-direction:column;border-top:1px solid var(--d-line)}
  .it{display:flex;align-items:center;gap:18px;padding:14px 2px;border-bottom:1px solid var(--d-line)}
  .it .c{font-family:'JetBrains Mono';font-size:13px;color:var(--brand);font-weight:700;width:30px}
  .it .t{font-size:16.5px;font-weight:600;color:#e7e8f3}
</style></head>
<body><div class="d">
  <div class="grid-bg"></div><div class="ghost">I</div>
  <div class="top"><div class="brand"><div class="mk"></div><div class="wm">BRAND</div></div>
    <div class="kk">Document type<br><span class="cpr">© Your Company Inc. 2026</span></div></div>
  <div class="mid"><span class="pl">Part I</span>
    <h1>Part Title</h1>
    <div class="rule"></div>
    <div class="desc">One or two sentences describing what this part covers and why it matters.</div></div>
  <div class="toc">
    <div class="it"><span class="c">01</span><span class="t">First chapter title</span></div>
    <div class="it"><span class="c">02</span><span class="t">Second chapter title</span></div>
    <div class="it"><span class="c">03</span><span class="t">Third chapter title</span></div>
  </div>
</div></body></html>
